<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.content{
position:relative;
z-index:2;
text-align:center;
margin-top:100px;
}

.btn{
display:block;
width:260px;
margin:20px auto;
padding:15px;
border:1px solid lime;
color:lime;
text-decoration:none;
font-size:18px;
}

.btn:hover{
background:lime;
color:black;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">

<h1 style="color:lime;">
AI DASHBOARD
</h1>

<a class="btn" href="/emotion">
Emotion Detection
</a>

<a class="btn" href="/lie">
Lie Detector
</a>

</div>

<script>

const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let chars="01".split("");
let size=14;
let cols=c.width/size;

let drops=[];

for(let i=0;i<cols;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff00";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

let text=
chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(
text,
i*size,
drops[i]*size
);

if(
drops[i]*size>c.height
&&
Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
